name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # PENTING: Menghubungkan secret ke environment variable agar terbaca oleh skrip
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas scikit-learn mlflow dagshub matplotlib seaborn

      - name: Run training script
        run: python Membangun_model/modelling.py
