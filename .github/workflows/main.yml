name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else echo "requirements.txt tidak ditemukan!"; exit 1; fi
        
    - name: Run training script
      env:
        # Token ini digunakan oleh dagshub.init() di dalam modelling.py
        DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        # Jika Anda masih menggunakan kredensial MLFlow tradisional, biarkan baris di bawah
        MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
        MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      run: |
        python Membangun_model/modelling.py
