name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      # Pastikan MLFLOW menggunakan token yang sama dengan DAGSHUB_TOKEN
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training script
        # Menambahkan --no-cache atau flag lain jika perlu, 
        # namun utamanya adalah memastikan environment variables tersedia
        run: python Membangun_model/modelling.py

      - name: Log in to Docker Hub
        run: echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Build Docker Image
        run: docker build -t "$DOCKERHUB_USERNAME/heart-disease-model:latest" .

      - name: Push Docker Image
        run: docker push "$DOCKERHUB_USERNAME/heart-disease-model:latest"
